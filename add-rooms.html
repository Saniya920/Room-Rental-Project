<!DOCTYPE html>
<html>
<head>
    <title>Add Room</title>
    <link rel="stylesheet" href="add-rooms.css">
</head>
<body>

    <h1>Add Room Details</h1>
    <h2>Your next chapter starts with the right room. </h2>

    <form id="roomForm">
        <input type="text" id="ownerName" placeholder="Owner Name" required><br><br>
        <input type="text" id="phone" placeholder="Phone Number" required><br><br>
        <input type="number" id="rent" placeholder="Monthly Rent" required><br><br>
        <input type="text" id="house-no" placeholder="House Number/Building Number" required><br><br>
        <input type="text" id="landmark" placeholder="Landmark" required><br><br>
        <input type="text" id="city" placeholder="Colony/District" required><br><br>
        <input type="text" id="state" placeholder="City/State" required><br><br>
        
        <select id="roomType">
            <option value="Single Room">Single Room</option>
            <option value="Shared Room">Shared Room</option>
            <option value="Full House">Full House</option>
        </select><br><br>

        <textarea id="description" placeholder="Description"></textarea><br><br>

        <button type="submit">Submit</button><br><br>
    </form>

    <script type="module" src="script.js"></script>
</body>
</html>
